<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BJT hFE Viewer</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb}
header{padding:12px 16px;border-bottom:1px solid #1f2937;font-weight:600}
.container{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 48px)}
.sidebar{padding:12px;border-right:1px solid #1f2937;overflow:auto;background:#0f172a}
#plot{height:100%}
.section{margin-bottom:14px;background:#111827;border:1px solid #1f2937;border-radius:10px}
.section.collapsed .content{display:none}
.section header{padding:8px 10px;font-size:12px;color:#9ca3af;cursor:pointer}
.content{padding:8px}

/* Clean, deterministic checkbox layout */
label{
  display:grid;
  grid-template-columns:1fr 24px 1fr;
  align-items:center;
  font-size:12px;
  margin:6px 0;
  cursor:pointer;
}

label span{
  grid-column:1;
  justify-self:start;
}

.cb{
  grid-column:2;
  display:flex;
  justify-content:center;
  align-items:center;
}

input[type="checkbox"]{
  margin:0;
}

/* tighten top/bottom edges */
#tFilters label:first-child,
#vFilters label:first-child{
  margin-top:2px;
}

#tFilters label:last-child,
#vFilters label:last-child{
  margin-bottom:2px;
}

input{width:100%;margin-top:6px;background:#020617;border:1px solid #1f2937;color:#e5e7eb;padding:6px;border-radius:6px}
button{background:#1f2937;color:white;border:none;padding:6px;border-radius:6px;cursor:pointer;margin-top:6px}
button:hover{background:#374151}
.row{display:flex;gap:6px}
.row button{flex:1}
</style>
</head>
<body>
<header>BJT hFE vs Ic Viewer</header>
<div class="container">
<div class="sidebar">

<div class="section" id="dataSection">
<header onclick="toggleSection('dataSection')">Data ▾</header>
<div class="content">
<input type="file" id="fileInput" multiple>
<input type="text" id="urlInput" placeholder="GitHub raw URL">
<div class="row">
<button onclick="loadURL()">Load</button>
<button onclick="clearData()">Clear</button>
</div>
<div class="row">
<button onclick="exportJSON()">JSON</button>
<button onclick="exportCSV()">CSV</button>
</div>
</div>
</div>

<div class="section">
<header>Transistors</header>
<div class="content" id="tFilters"></div>
</div>

<div class="section">
<header>Vce</header>
<div class="content" id="vFilters"></div>
</div>

<div class="section">
<header>Options</header>
<div class="content">
<label><span>Smooth</span><div class="cb"><input type="checkbox" id="smooth"></div></label>
</div>
</div>

</div>
<div id="plot"></div>
</div>

<script>
let datasets={};
const baseHues=[210,330,140,45,260,0,190,280];
let transistorColorMap={};
let nextColorIndex=0;

function getBaseHue(t){
  if(!(t in transistorColorMap)){
    transistorColorMap[t]=baseHues[nextColorIndex % baseHues.length];
    nextColorIndex++;
  }
  return transistorColorMap[t];
}

function getColor(t,vIndex,vCount){
  const hue=getBaseHue(t);
  const lightness=70 - (vIndex/(vCount-1||1))*35;
  return `hsl(${hue},70%,${lightness}%)`;
}

function toggleSection(id){
  const el=document.getElementById(id);
  el.classList.toggle('collapsed');
  const h=el.querySelector('header');
  h.textContent=el.classList.contains('collapsed')?"Data ▸":"Data ▾";
}

function collapseData(){
  const el=document.getElementById('dataSection');
  if(!el.classList.contains('collapsed')){
    el.classList.add('collapsed');
    el.querySelector('header').textContent="Data ▸";
  }
}

function approxEqual(a,b,eps=1e-6){return Math.abs(a-b)<eps}

function parseFile(text){
  try{mergeDataset(JSON.parse(text));return}catch{}
  const lines=text.split(/\r?\n/);
  const traceLine=lines.find(l=>l.startsWith("Trace:"));
  if(!traceLine) return;

  const raw=traceLine.replace("Trace:","").split(/\t+/).filter(Boolean);

  const meta=raw.map(t=>{
    const m=t.match(/(.+?)Vce=(.+?)V/);
    return m?{t:m[1].trim(),v:m[2].trim()+"V"}:null;
  });

  const start=lines.findIndex(l=>/^\d+\t/.test(l));
  if(start === -1) return;

  for(let i=start;i<lines.length;i++){
    const p=lines[i].split("\t");
    meta.forEach((m,idx)=>{
      if(!m) return;
      const icIdx=1+idx*2;
      const hIdx=2+idx*2;
      if(icIdx>=p.length||hIdx>=p.length) return;
      const ic=parseFloat(p[icIdx]);
      const h=parseFloat(p[hIdx]);
      if(isNaN(ic)||isNaN(h)) return;
      addPoint(m.t,m.v,ic,h);
    });
  }
}

function addPoint(t,v,ic,h){
  if(!datasets[t]) datasets[t]={};
  if(!datasets[t][v]) datasets[t][v]=[];
  const arr=datasets[t][v];
  if(!arr.some(d=>approxEqual(d.ic,ic)&&approxEqual(d.hfe,h))){
    arr.push({ic,hfe:h});
  }
}

function mergeDataset(obj){
  Object.entries(obj).forEach(([t,vobj])=>{
    Object.entries(vobj).forEach(([v,arr])=>{
      arr.forEach(p=>addPoint(t,v,p.ic,p.hfe));
    });
  });
}

function updateFilters(){
  const tDiv=document.getElementById("tFilters");
  const vDiv=document.getElementById("vFilters");
  tDiv.innerHTML=""; vDiv.innerHTML="";

  const ts=Object.keys(datasets);
  const vs=new Set();

  ts.forEach(t=>{
    Object.keys(datasets[t]).forEach(v=>vs.add(v));
    tDiv.innerHTML+=`<label><span>${t}</span><div class="cb"><input type="checkbox" class="t" value="${t}" checked></div></label>`;
  });

  vs.forEach(v=>{
    vDiv.innerHTML+=`<label><span>${v}</span><div class="cb"><input type="checkbox" class="v" value="${v}" checked></div></label>`;
  });

  document.querySelectorAll('#tFilters input, #vFilters input').forEach(el=>el.onchange=draw);
}

function draw(){
  const ts=[...document.querySelectorAll('.t:checked')].map(e=>e.value);
  const vs=[...document.querySelectorAll('.v:checked')].map(e=>e.value);
  const smooth=document.getElementById("smooth").checked;

  const traces=[];

  ts.forEach(t=>{
    const vList=Object.keys(datasets[t]||{}).sort((a,b)=>parseFloat(a)-parseFloat(b));
    vs.forEach(v=>{
      if(!vList.includes(v)) return;
      const vi=vList.indexOf(v);
      const d=datasets[t]?.[v];
      if(!d) return;

      const sorted=[...d].sort((a,b)=>a.ic-b.ic);

      traces.push({
        x:sorted.map(p=>p.ic),
        y:sorted.map(p=>p.hfe),
        mode:'lines',
        name:`${t} ${v}`,
        legendgroup:t,
        line:{shape:smooth?'spline':'linear',color:getColor(t,vi,vList.length)},
        hovertemplate:
          `Transistor: ${t}<br>`+
          `Vce: ${v}<br>`+
          `Ic: %{x:.3f} mA<br>`+
          `hFE: %{y:.1f}<extra></extra>`
      });
    });
  });

  Plotly.newPlot('plot',traces,{
    paper_bgcolor:'#0b1220',plot_bgcolor:'#0b1220',
    font:{color:'#e5e7eb'},
    xaxis:{title:'Ic (mA)',gridcolor:'#1f2937'},
    yaxis:{title:'hFE',gridcolor:'#1f2937'},
    legend:{groupclick:'toggleitem'}
  });
}

function exportJSON(){download(JSON.stringify(datasets,null,2),'data.json')}
function exportCSV(){
  let rows=["transistor,vce,Ic,hFE"];
  Object.entries(datasets).forEach(([t,vobj])=>{
    Object.entries(vobj).forEach(([v,arr])=>{
      arr.forEach(p=>rows.push(`${t},${v},${p.ic},${p.hfe}`));
    });
  });
  download(rows.join("\n"),'data.csv');
}

function download(content,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content]));
  a.download=name;
  a.click();
}

async function loadURL(){
  const url=document.getElementById('urlInput').value;
  if(!url) return;
  const res=await fetch(url);
  const text=await res.text();
  parseFile(text);
  updateFilters();
  draw();
  collapseData();
}

function clearData(){datasets={};transistorColorMap={};nextColorIndex=0;updateFilters();draw();toggleSection('dataSection')}

document.getElementById('fileInput').onchange=async e=>{
  for(const f of e.target.files){parseFile(await f.text())}
  updateFilters();
  draw();
  collapseData();
}

window.onload=()=>{
  if(Object.keys(datasets).length===0){
    document.getElementById('dataSection').classList.remove('collapsed');
  }
}
</script>
</body>
</html>
