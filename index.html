<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BJT hFE Viewer</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb}
header{padding:12px 16px;border-bottom:1px solid #1f2937;font-weight:600}
.container{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 48px)}
.sidebar{padding:12px;border-right:1px solid #1f2937;overflow:auto;background:#0f172a}
#plot{height:100%}
.section{margin-bottom:14px;background:#111827;border:1px solid #1f2937;border-radius:10px}
.section.collapsed .content{display:none}
.section header{padding:8px 10px;font-size:12px;color:#9ca3af;cursor:pointer}
.content{padding:8px}

label{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  font-size:12px;
  margin:4px 0 8px 0;
}

label span{
  grid-column:1;
  justify-self:start;
}

.cb{
  grid-column:2;
  display:flex;
  justify-content:center;
  align-items:center;
}

input[type="checkbox"]{
  margin:0;
}

#tFilters label:first-child,
#vFilters label:first-child{
  margin-top:0;
}

#tFilters label:last-child,
#vFilters label:last-child{
  margin-bottom:2px;
}

input[type="text"],
input[type="file"]{
  width:100%;
  margin-top:6px;
  background:#020617;
  border:1px solid #1f2937;
  color:#e5e7eb;
  padding:6px;
  border-radius:6px;
  box-sizing:border-box;
}

button{background:#1f2937;color:white;border:none;padding:6px;border-radius:6px;cursor:pointer;margin-top:6px}
button:hover{background:#374151}
.row{display:flex;gap:6px}
.row button{flex:1}

.error{color:#f87171;font-size:11px;margin-top:5px;display:none}
.error.visible{display:block}
</style>
</head>
<body>
<header>BJT hFE vs Ic Viewer</header>
<div class="container">
<div class="sidebar">

<div class="section collapsed" id="dataSection">
<header onclick="toggleData()">Data ▸</header>
<div class="content">
<input type="file" id="fileInput" multiple>
<input type="text" id="urlInput" placeholder="Data URL">
<div id="urlError" class="error"></div>
<div class="row">
<button onclick="loadURL()">Load</button>
<button onclick="clearData()">Clear</button>
</div>
<div class="row">
<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportCSV()">Export CSV</button>
</div>
</div>
</div>

<div class="section">
<header>Transistors</header>
<div class="content" id="tFilters"></div>
</div>

<div class="section">
<header>Vce</header>
<div class="content" id="vFilters"></div>
</div>

<div class="section">
<header>Options</header>
<div class="content">
<label>
  <span>Smooth</span>
  <div class="cb"><input type="checkbox" id="smooth" onchange="draw()"></div>
</label>
</div>
</div>

</div>
<div id="plot"></div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────

let datasets = {};
const BASE_HUES = [210, 330, 140, 45, 260, 0, 190, 280];
let transistorColorMap = {};
let nextColorIndex = 0;

// ─── Color ────────────────────────────────────────────────────────────────────

function getBaseHue(t) {
  if (!(t in transistorColorMap)) {
    transistorColorMap[t] = BASE_HUES[nextColorIndex % BASE_HUES.length];
    nextColorIndex++;
  }
  return transistorColorMap[t];
}

function getColor(t, vIndex, vCount) {
  const hue = getBaseHue(t);
  const lightness = 70 - (vIndex / (vCount - 1 || 1)) * 35;
  return `hsl(${hue},70%,${lightness}%)`;
}

// ─── Data section panel ───────────────────────────────────────────────────────

function openData() {
  const el = document.getElementById('dataSection');
  el.classList.remove('collapsed');
  el.querySelector('header').textContent = "Data ▾";
}

function collapseData() {
  const el = document.getElementById('dataSection');
  el.classList.add('collapsed');
  el.querySelector('header').textContent = "Data ▸";
}

function toggleData() {
  const el = document.getElementById('dataSection');
  el.classList.contains('collapsed') ? openData() : collapseData();
}

// ─── Parsing ──────────────────────────────────────────────────────────────────

function approxEqual(a, b, eps = 1e-6) {
  return Math.abs(a - b) < eps;
}

function parseFile(text) {
  // Try JSON first (previously exported datasets)
  try { mergeDataset(JSON.parse(text)); return; } catch {}

  // Otherwise parse Peak Atlas tab-delimited format
  const lines = text.split(/\r?\n/);
  const traceLine = lines.find(l => l.startsWith("Trace:"));
  if (!traceLine) return;

  const raw = traceLine.replace("Trace:", "").split(/\t+/).filter(Boolean);
  const meta = raw.map(t => {
    const m = t.match(/(.+?)Vce=(.+?)V/);
    return m ? { t: m[1].trim(), v: m[2].trim() + "V" } : null;
  });

  const start = lines.findIndex(l => /^\d+\t/.test(l));
  for (let i = start; i < lines.length; i++) {
    const p = lines[i].split("\t");
    meta.forEach((m, idx) => {
      if (!m) return;
      const icIdx = 1 + idx * 2;
      const hIdx  = 2 + idx * 2;
      if (icIdx >= p.length || hIdx >= p.length) return;
      const ic = parseFloat(p[icIdx]);
      const h  = parseFloat(p[hIdx]);
      if (isNaN(ic) || isNaN(h)) return;
      addPoint(m.t, m.v, ic, h);
    });
  }
}

function addPoint(t, v, ic, h) {
  if (!datasets[t]) datasets[t] = {};
  if (!datasets[t][v]) datasets[t][v] = [];
  const arr = datasets[t][v];
  if (!arr.some(d => approxEqual(d.ic, ic) && approxEqual(d.hfe, h))) {
    arr.push({ ic, hfe: h });
  }
}

function mergeDataset(obj) {
  Object.entries(obj).forEach(([t, vobj]) => {
    Object.entries(vobj).forEach(([v, arr]) => {
      arr.forEach(p => addPoint(t, v, p.ic, p.hfe));
    });
  });
}

// ─── Filters ──────────────────────────────────────────────────────────────────

// selectedT / selectedV are optional Sets; if omitted, all boxes are checked.
function updateFilters(selectedT, selectedV) {
  const tDiv = document.getElementById("tFilters");
  const vDiv = document.getElementById("vFilters");
  tDiv.innerHTML = "";
  vDiv.innerHTML = "";

  const ts = Object.keys(datasets);
  const vs = new Set();
  ts.forEach(t => Object.keys(datasets[t]).forEach(v => vs.add(v)));
  const vsSorted = Array.from(vs).sort((a, b) => parseFloat(a) - parseFloat(b));

  ts.forEach(t => {
    const chk = !selectedT || selectedT.has(t) ? 'checked' : '';
    tDiv.innerHTML += `<label><span>${t}</span><div class="cb"><input type="checkbox" class="t" value="${t}" ${chk}></div></label>`;
  });

  vsSorted.forEach(v => {
    const chk = !selectedV || selectedV.has(v) ? 'checked' : '';
    vDiv.innerHTML += `<label><span>${v}</span><div class="cb"><input type="checkbox" class="v" value="${v}" ${chk}></div></label>`;
  });

  // Scope event binding to filter checkboxes only
  document.querySelectorAll('#tFilters input[type="checkbox"], #vFilters input[type="checkbox"]')
    .forEach(el => el.onchange = draw);
}

// ─── Plot ─────────────────────────────────────────────────────────────────────

const PLOTLY_LAYOUT = {
  paper_bgcolor: '#0b1220',
  plot_bgcolor:  '#0b1220',
  font:   { color: '#e5e7eb' },
  xaxis:  { title: 'Ic (mA)', gridcolor: '#1f2937' },
  yaxis:  { title: 'hFE',     gridcolor: '#1f2937' },
  legend: { groupclick: 'toggleitem' }
};

const PLOTLY_CONFIG = { responsive: true };

function draw() {
  const ts     = [...document.querySelectorAll('.t:checked')].map(e => e.value);
  const vs     = [...document.querySelectorAll('.v:checked')].map(e => e.value);
  const smooth = document.getElementById("smooth").checked;

  const traces = [];

  ts.forEach(t => {
    const vList = Object.keys(datasets[t] || {})
      .sort((a, b) => parseFloat(a) - parseFloat(b));

    vs.forEach(v => {
      if (!vList.includes(v)) return;
      const vi = vList.indexOf(v);
      const d  = datasets[t]?.[v];
      if (!d) return;

      const sorted = [...d].sort((a, b) => a.ic - b.ic);
      traces.push({
        x: sorted.map(p => p.ic),
        y: sorted.map(p => p.hfe),
        mode: 'lines',
        name: `${t} ${v}`,
        legendgroup: t,
        line: {
          shape: smooth ? 'spline' : 'linear',
          color: getColor(t, vi, vList.length)
        },
        hovertemplate:
          `Transistor: ${t}<br>` +
          `Vce: ${v}<br>`        +
          `Ic: %{x:.3f} mA<br>` +
          `hFE: %{y:.1f}<extra></extra>`
      });
    });
  });

  // Plotly.react diffs traces and only redraws what changed;
  // works correctly on first call too (no separate newPlot needed).
  Plotly.react('plot', traces, PLOTLY_LAYOUT, PLOTLY_CONFIG);
  pushURLState();
}

// ─── URL state ────────────────────────────────────────────────────────────────

function pushURLState() {
  const params = new URLSearchParams(window.location.search);

  const ts = [...document.querySelectorAll('.t:checked')].map(e => e.value);
  const vs = [...document.querySelectorAll('.v:checked')].map(e => e.value);
  const smooth = document.getElementById("smooth").checked;

  ts.length ? params.set('t', ts.join(',')) : params.delete('t');
  vs.length ? params.set('v', vs.join(',')) : params.delete('v');
  smooth    ? params.set('s', '1')          : params.delete('s');

  history.replaceState(null, '', '?' + params.toString());
}

function restoreURLFilters(params) {
  const tParam = params.get('t');
  const vParam = params.get('v');

  const selectedT = tParam ? new Set(tParam.split(',')) : null;
  const selectedV = vParam ? new Set(vParam.split(',')) : null;
  updateFilters(selectedT, selectedV);

  if (params.get('s') === '1') document.getElementById('smooth').checked = true;
}

// ─── Export ───────────────────────────────────────────────────────────────────

function exportJSON() {
  download(JSON.stringify(datasets, null, 2), 'data.json');
}

function exportCSV() {
  const rows = ["transistor,vce,Ic,hFE"];
  Object.entries(datasets).forEach(([t, vobj]) => {
    Object.entries(vobj).forEach(([v, arr]) => {
      arr.forEach(p => rows.push(`${t},${v},${p.ic},${p.hfe}`));
    });
  });
  download(rows.join("\n"), 'data.csv');
}

function download(content, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content]));
  a.download = name;
  a.click();
}

// ─── Load ─────────────────────────────────────────────────────────────────────

async function loadURL() {
  const url    = document.getElementById('urlInput').value.trim();
  const errEl  = document.getElementById('urlError');
  errEl.classList.remove('visible');
  if (!url) return;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    parseFile(await res.text());
    updateFilters();
    draw();
    collapseData();
  } catch (err) {
    errEl.textContent = `Load failed: ${err.message}`;
    errEl.classList.add('visible');
  }
}

function clearData() {
  datasets          = {};
  transistorColorMap = {};
  nextColorIndex    = 0;
  updateFilters();
  draw();
  openData();
}

document.getElementById('fileInput').onchange = async e => {
  for (const f of e.target.files) { parseFile(await f.text()); }
  updateFilters();
  draw();
  collapseData();
};

// ─── Init ─────────────────────────────────────────────────────────────────────

window.onload = async () => {
  const params  = new URLSearchParams(window.location.search);
  const dataUrl = params.get('data');

  if (dataUrl) {
    const errEl = document.getElementById('urlError');
    try {
      document.getElementById('urlInput').value = dataUrl;
      const res = await fetch(dataUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      parseFile(await res.text());
      restoreURLFilters(params);   // restore t/v/s from URL after parsing
      draw();
      collapseData();
    } catch (err) {
      errEl.textContent = `Auto-load failed: ${err.message}`;
      errEl.classList.add('visible');
      openData();
    }
  } else {
    openData();   // no data yet — show the panel
  }
};
</script>
</body>
</html>
